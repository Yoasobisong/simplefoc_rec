; PlatformIO Project Configuration
; AS5600 Magnetic Encoder Test - STM32F103C8
; Read AS5600 via I2C1, display on SSD1306 OLED via software I2C

[env:genericSTM32F103C8]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
upload_protocol = jlink
debug_tool = jlink
monitor_speed = 115200

lib_deps =
    olikraus/U8g2@^2.35.19

build_flags =
    -D SERIAL_UART_INSTANCE=3
