; PlatformIO Project Configuration
; Serial (USART3) + CAN Communication Test
; Two boards cross-connected, Master/Slave selected by env

[platformio]
default_envs = master

[env]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
upload_protocol = jlink
debug_tool = jlink

lib_deps =
    olikraus/U8g2@^2.35.19

build_flags =
    -D HAL_CAN_MODULE_ENABLED
    -D SERIAL_UART_INSTANCE=3

; ---- Master: flash to board A ----
[env:master]
build_flags =
    ${env.build_flags}
    -D NODE_ROLE=0

; ---- Slave: flash to board B ----
[env:slave]
build_flags =
    ${env.build_flags}
    -D NODE_ROLE=1
