; PlatformIO Project Configuration
; SimpleFOC CAN Servo Controller - STM32F103C8

[platformio]
default_envs = debug

; ============================================================================
;  Common settings shared by all environments
; ============================================================================
[env]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
upload_protocol = jlink
debug_tool = jlink
monitor_speed = 115200

lib_deps = askuric/Simple FOC@^2.4.0

build_flags =
    -D HAL_CAN_MODULE_ENABLED
    -D CAN_NODE_ID=1

; ============================================================================
;  Debug environment: Serial + Commander + CAN
; ============================================================================
[env:debug]
build_flags =
    ${env.build_flags}
    -D SERIAL_UART_INSTANCE=3
    -D DEBUG_MODE

; ============================================================================
;  Production environment: FOC + CAN only, no Serial overhead
; ============================================================================
[env:production]
build_flags =
    ${env.build_flags}
